<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Artis - KonserId</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0B0E1A; color:#fff; min-height:100vh;">
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="admin-layout">
        <div th:replace="~{admin-sidebar :: sidebar}"></div>

        <div class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Kelola Data Artis</h2>
                <a href="/artis/tambah" class="btn btn-primary">+ Tambah Artis</a>
            </div>

            <table class="table table-dark table-striped align-middle">
                <thead>
                    <tr>
                        <th>Nama Artis</th>
                        <th>Konser</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
				<tbody>
				    <tr th:each="entry : ${groupedArtis}">
				        <td th:text="${entry.key}">Nama</td>
				        <td>
				            <span th:each="gs, iter : ${entry.value}">
				                <span th:text="${gs.konser != null ? gs.konser.namaEvent : '-'}">Konser</span><span th:if="${!iter.last}">, </span>
				            </span>
				        </td>
				        <td>
				            <a th:each="gs : ${entry.value}" th:href="@{'/artis/edit/' + ${gs.id}}" class="btn btn-sm btn-warning me-1">Edit</a>
				            <a th:each="gs : ${entry.value}" th:href="@{'/artis/hapus/' + ${gs.id}}" class="btn btn-sm btn-danger"
				               onclick="return confirm('Yakin hapus data artis ini?')">Hapus</a>
				        </td>
				    </tr>
				</tbody>
            </table>
        </div>
    </div>
</body>
