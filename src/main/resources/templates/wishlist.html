<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Saya | TemanKonser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --stage-black: #0B0E1A;
            --spot-violet: #8B5CF6;
            --spot-pink: #FB7185;
            --spot-amber: #FBBF24;
            --paper: #FAF9F6;
            --ink: #1B1B29;
            --ink-violet: #4C3399;
            --muted-dark: #A8AEDB;
            --muted-light: #6B7280;
            --font-display: 'Anton', sans-serif;
            --font-body: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--stage-black);
            background-image:
                radial-gradient(ellipse 700px 450px at 8% -5%, rgba(139,92,246,0.22), transparent 60%),
                radial-gradient(ellipse 600px 400px at 95% 5%, rgba(251,113,133,0.16), transparent 60%),
                radial-gradient(ellipse 500px 600px at 50% 100%, rgba(251,191,36,0.06), transparent 70%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: var(--font-body);
            color: var(--muted-dark);
            min-height: 100vh;
        }

        .page-header { margin-bottom: 40px; }
        .page-title {
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.01em;
            font-size: 1.6rem;
            color: #fff;
        }
        .page-title i { color: var(--spot-pink); }
        .page-sub { color: var(--muted-dark); }

        .btn-back {
            border-radius: 50px;
            font-weight: 700;
            padding: 8px 24px;
            font-size: 0.9rem;
            background: transparent;
            border: 1.5px solid rgba(139,92,246,0.4);
            color: var(--spot-violet);
            transition: 0.2s;
        }
        .btn-back:hover {
            background: rgba(139,92,246,0.1);
            color: var(--spot-violet);
            transform: translateY(-1px);
        }

        .dashboard-card {
            border-radius: 20px;
            border: none;
            background: var(--paper);
            box-shadow: 0 10px 26px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 34px rgba(0,0,0,0.4);
        }

        .badge-status {
            border-radius: 8px;
            padding: 6px 14px;
            font-weight: 700;
            font-size: 0.75rem;
            background: rgba(139,92,246,0.12);
            color: var(--ink-violet);
            border: 1px solid rgba(139,92,246,0.25);
        }

        .btn-action {
            border-radius: 50px;
            font-weight: 700;
            padding: 8px 24px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-action:hover { transform: translateY(-1px); }

        .icon-wrapper {
            width: 40px;
            height: 40px;
            background: rgba(251,191,36,0.18);
            color: var(--ink);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-wrapper.location {
            background: rgba(251,113,133,0.14);
            color: var(--spot-pink);
        }

        .price-value {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--ink);
        }

        .btn-delete {
            border-radius: 50px;
            font-weight: 700;
            padding: 8px 24px;
            font-size: 0.9rem;
            background: transparent;
            border: 1.5px solid var(--spot-pink);
            color: var(--spot-pink);
            transition: 0.2s;
        }
        .btn-delete:hover {
            background: var(--spot-pink);
            color: #fff;
            transform: translateY(-1px);
        }

        .empty-state-card {
            border: none;
            border-radius: 24px;
            background: var(--paper);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .empty-heading {
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.01em;
            color: var(--ink);
        }
        .empty-icon { color: var(--spot-violet); opacity: 0.45; }

        .btn-cta {
            border-radius: 50px;
            font-weight: 700;
            border: none;
            background: linear-gradient(135deg, var(--spot-violet) 0%, var(--spot-pink) 100%);
            color: #fff;
            transition: 0.2s;
        }
        .btn-cta:hover {
            opacity: 0.92;
            transform: translateY(-2px);
            color: #fff;
            box-shadow: 0 10px 22px rgba(139,92,246,0.35);
        }
    </style>
</head>
<body>

    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center page-header flex-wrap gap-3">
            <div>
                <h2 class="page-title fw-bold m-0">Wishlist Saya</h2>
                <p class="page-sub small m-0 mt-1">Daftar konser impian yang ingin kamu datangi.</p>
            </div>
            <a href="/daftar-konser" class="btn btn-back btn-action">
                <i class="bi bi-arrow-left me-2"></i>Kembali ke Daftar Konser
            </a>
        </div>

        <div class="row g-3">
            <div class="col-md-12" th:each="item : ${listWishlist}">
                <div class="card dashboard-card p-4">
                    <div class="row align-items-center g-3">

                        <div class="col-md-4">
                            <h5 class="fw-bold mb-2" style="color: var(--ink);" th:text="${item.konser.namaEvent}">Nama Event</h5>
                            <span class="badge-status" th:text="${item.konser.status}">Tersedia</span>
                        </div>

                        <div class="col-md-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-wrapper location">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block fw-medium text-uppercase tracking-wider" style="font-size: 0.7rem;">Lokasi</small>
                                    <span class="fw-semibold" style="color: var(--muted-light);" th:text="${item.konser.lokasi}">Lokasi</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-wrapper">
                                    <i class="bi bi-tags-fill"></i>
                                </div>
                                <div>
                                    <small class="text-muted d-block fw-medium text-uppercase tracking-wider" style="font-size: 0.7rem;">Harga Tiket</small>
                                    <span class="price-value" th:text="${'Rp ' + #numbers.formatDecimal(item.konser.hargaTiket, 0, 'POINT', 0, 'COMMA')}">Harga</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2 text-end">
                            <a th:href="@{/wishlist/delete/{id}(id=${item.id})}"
                               class="btn btn-delete btn-action w-100"
                               onclick="return confirm('Yakin ingin menghapus konser ini dari wishlist kamu?')">
                                <i class="bi bi-trash3 me-1"></i> Hapus
                            </a>
                        </div>

                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(listWishlist)}" class="col-12 text-center py-5">
                <div class="card p-5 empty-state-card text-center">
                    <div class="mb-4">
                        <i class="bi bi-heartbreak empty-icon" style="font-size: 4.5rem;"></i>
                    </div>
                    <h4 class="empty-heading fw-bold mb-2">Wishlist kamu masih kosong!</h4>
                    <p class="mb-4 mx-auto" style="max-width: 400px; color: var(--muted-light);">Belum ada konser yang kamu simpan. Yuk, jelajahi konser musik seru dan masukkan ke daftar keinginanmu!</p>
                    <div>
                        <a href="/daftar-konser" class="btn btn-cta btn-action shadow-sm px-5 py-2">
                            <i class="bi bi-search me-2"></i>Jelajahi Konser
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
