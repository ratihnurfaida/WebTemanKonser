<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Artis - KonserId</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#0B0E1A; color:#fff; min-height:100vh;">
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container py-5" style="max-width:500px;">
        <h2 class="fw-bold mb-4" th:text="${artis.id == 0 ? 'Tambah Artis' : 'Edit Artis'}">Form Artis</h2>

        <form th:action="@{/artis/tambah}" th:object="${artis}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nama Artis</label>
                <input type="text" class="form-control" th:field="*{namaArtis}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Konser</label>
                <select class="form-select" th:field="*{konser}" required>
                    <option value="">-- Pilih Konser --</option>
                    <option th:each="k : ${listKonser}" th:value="${k.id}" th:text="${k.namaEvent}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Simpan</button>
        </form>
    </div>
</body>
</html>
