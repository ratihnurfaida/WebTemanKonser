<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Konser - KonserId</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0B0E1A; color:#fff; min-height:100vh;">
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="admin-layout">
        <div th:replace="~{admin-sidebar :: sidebar}"></div>

        <div class="admin-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Kelola Data Konser</h2>
                <a href="/tambah" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Tambah Konser</a>
            </div>

            <table class="table table-dark table-striped align-middle">
                <thead>
                    <tr>
                        <th>Nama Event</th>
                        <th>Lokasi</th>
                        <th>Tanggal</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="k : ${listKonser}">
                        <td th:text="${k.namaEvent}">Nama</td>
                        <td th:text="${k.lokasi}">Lokasi</td>
                        <td th:text="${k.tanggalAcara}">Tanggal</td>
                        <td th:text="${k.status}">Status</td>
                        <td>
                            <a th:href="@{'/konser/detail/' + ${k.id}}" class="btn btn-sm btn-secondary">Lihat</a>
                            <a th:href="@{'/edit/' + ${k.id}}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{'/hapus/' + ${k.id}}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Yakin hapus konser ini? Artis & wishlist terkait ikut terhapus.')">Hapus</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
