<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - KonserId</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background:#0B0E1A; color:#fff; min-height:100vh;">
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="admin-layout">
        <div th:replace="~{admin-sidebar :: sidebar}"></div>

        <div class="admin-content">
            <h2 class="fw-bold mb-4">Dasbor Admin</h2>
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="p-4 rounded" style="background:#151A2E;">
                        <div class="fs-6 text-secondary">Total Konser</div>
                        <div class="fs-2 fw-bold" th:text="${totalKonser}">0</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 rounded" style="background:#151A2E;">
                        <div class="fs-6 text-secondary">Total Artis</div>
                        <div class="fs-2 fw-bold" th:text="${totalArtis}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
