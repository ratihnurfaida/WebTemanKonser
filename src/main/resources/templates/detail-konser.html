<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${konser.namaEvent} + ' | TemanKonser'">Detail Konser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --stage-black: #0B0E1A;
            --spot-violet: #8B5CF6;
            --spot-pink: #FB7185;
            --spot-amber: #FBBF24;
            --paper: #FAF9F6;
            --ink: #1B1B29;
            --ink-violet: #4C3399;
            --muted-dark: #A8AEDB;
            --muted-light: #6B7280;
            --font-display: 'Anton', sans-serif;
            --font-body: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--stage-black);
            background-image:
                radial-gradient(ellipse 700px 450px at 8% -5%, rgba(139,92,246,0.22), transparent 60%),
                radial-gradient(ellipse 600px 400px at 95% 5%, rgba(251,113,133,0.16), transparent 60%),
                radial-gradient(ellipse 500px 600px at 50% 100%, rgba(251,191,36,0.06), transparent 70%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: var(--font-body);
            color: var(--muted-dark);
            min-height: 100vh;
        }

        .main-card {
            background: var(--paper);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            border: none;
        }

        .poster-placeholder {
            position: relative;
            height: 220px;
            background: linear-gradient(135deg, var(--spot-violet) 0%, var(--spot-pink) 55%, var(--spot-amber) 130%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        .eq-bar-lg {
            width: 10px;
            border-radius: 5px;
            background: rgba(255,255,255,0.85);
            animation: eq-amb 1.6s ease-in-out infinite;
        }
        .eq-bar-lg:nth-child(1) { height: 34px; animation-delay: 0s; }
        .eq-bar-lg:nth-child(2) { height: 64px; animation-delay: 0.15s; }
        .eq-bar-lg:nth-child(3) { height: 46px; animation-delay: 0.3s; }
        .eq-bar-lg:nth-child(4) { height: 78px; animation-delay: 0.05s; }
        .eq-bar-lg:nth-child(5) { height: 52px; animation-delay: 0.2s; }
        @keyframes eq-amb {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.45); }
        }

        .event-title {
            font-family: var(--font-display);
            letter-spacing: 0.01em;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: var(--ink);
        }

        .price-label {
            display: block;
            font-size: 0.72rem;
            color: var(--muted-light);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .price-box {
            font-family: var(--font-mono);
            background: var(--spot-amber);
            color: var(--ink);
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.6rem;
            display: inline-block;
        }

        .logistik-panel {
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.15);
            border-radius: 18px;
            padding: 28px;
        }
        .logistik-panel h5 { color: var(--ink); }

        .info-row {
            padding: 16px 0;
            border-bottom: 1px dashed rgba(27,27,41,0.15);
        }
        .info-row:last-of-type { border-bottom: none; }
        .info-row .label-col { color: var(--muted-light); font-weight: 600; }
        .info-row .value-col { color: var(--ink); font-weight: 600; }
        .icon-loc { color: var(--spot-pink); }
        .icon-date { color: var(--spot-violet); }

        .section-heading { color: var(--ink); }

        .badge-artist {
            background: rgba(139,92,246,0.1);
            color: var(--ink-violet);
            border: 1px solid rgba(139,92,246,0.3);
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
        }
        .badge-artist i { color: var(--spot-amber); }

        .desc-text { color: var(--muted-light); }

        .divider-dashed {
            border: none;
            border-top: 1px dashed rgba(27,27,41,0.15);
            margin: 0;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 700;
            padding: 12px 32px;
            transition: 0.2s;
            border: none;
        }
        .btn-custom:hover { transform: translateY(-2px); }

        .btn-wishlist {
            background: linear-gradient(135deg, var(--spot-violet) 0%, var(--spot-pink) 100%);
            color: #fff;
        }
        .btn-wishlist:hover {
            color: #fff;
            box-shadow: 0 10px 22px rgba(139,92,246,0.35);
        }

        .btn-back {
            background: transparent;
            border: 1.5px solid rgba(139,92,246,0.4);
            color: var(--spot-violet);
        }
        .btn-back:hover {
            background: rgba(139,92,246,0.1);
            color: var(--spot-violet);
        }
    </style>
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="main-card">
					<div th:if="${konser.gambar != null and konser.gambar != ''}" class="poster-container mb-4">
					    <img th:src="${konser.gambar}" 
					         alt="Poster Konser" 
					         class="img-fluid rounded-4 shadow" 
					         style="width: 100%; height: 300px; object-fit: cover;">
					</div>

					<div th:unless="${konser.gambar != null and konser.gambar != ''}" class="poster-placeholder">
					    <span class="eq-bar-lg"></span>
					    <span class="eq-bar-lg"></span>
					    <span class="eq-bar-lg"></span>
					    <span class="eq-bar-lg"></span>
					    <span class="eq-bar-lg"></span>
					</div>

                    <h1 class="event-title mb-3" th:text="${konser.namaEvent}">Nama Event</h1>

                    <div class="mb-4">
                        <span class="price-label">Harga Tiket Mulai Dari</span>
                        <div class="price-box">
                            <span th:if="${konser.hargaTiket != null}" th:text="'Rp ' + ${#numbers.formatDecimal(konser.hargaTiket, 0, 'POINT', 0, 'COMMA')}"></span>
                            <span th:if="${konser.hargaTiket == null}">Gratis</span>
                        </div>
                    </div>

                    <div class="logistik-panel mb-4">
                        <h5 class="fw-bold mb-3 section-heading"><i class="bi bi-info-circle-fill text-secondary me-2"></i>Logistik Konser</h5>

                        <div class="row info-row align-items-center">
                            <div class="col-sm-3 label-col"><i class="bi bi-geo-alt-fill icon-loc me-2"></i>Lokasi</div>
                            <div class="col-sm-9 value-col" th:text="${konser.lokasi}">Lokasi</div>
                        </div>
                        <div class="row info-row align-items-center">
                            <div class="col-sm-3 label-col"><i class="bi bi-calendar-event-fill icon-date me-2"></i>Tanggal</div>
                            <div class="col-sm-9 value-col" th:text="${konser.tanggalAcara}">Tanggal</div>
                        </div>
                    </div>

					<div class="mb-4">
					    <h5 class="fw-bold mb-3 section-heading">Line Up Guest Star</h5>
					    
					    <!-- Bagian List Talent -->
					    <div th:if="${konser.daftarGuestStar != null and !#lists.isEmpty(konser.daftarGuestStar)}" 
					         class="d-flex flex-column gap-3">
					        
					        <div th:each="gs : ${konser.daftarGuestStar}" class="d-flex align-items-center">
					            <!-- Container Ikon Orang -->
					            <div class="me-3 d-flex align-items-center justify-content-center" 
					                 style="width: 50px; height: 50px; background-color: #f8f9fa; border: 1px solid #eee; border-radius: 12px;">
					                <i class="bi bi-person-fill" style="font-size: 1.5rem; color: #6c757d;"></i>
					            </div>
					            
					            <!-- Nama Artis -->
					            <span class="fw-bold" th:text="${gs.namaArtis}">Nama Artis</span>
					        </div>
					    </div>

					    <!-- Bagian jika data kosong -->
					    <div th:if="${konser.daftarGuestStar == null or #lists.isEmpty(konser.daftarGuestStar)}">
					        <p class="text-muted small fst-italic">Line up akan segera diumumkan.</p>
					    </div>
					</div>

                    <div class="mb-5">
                        <h5 class="fw-bold mb-2 section-heading"><i class="bi bi-file-text-fill text-secondary me-2"></i>Deskripsi Acara</h5>
                        <p class="desc-text lh-lg" th:text="${konser.deskripsi}">Deskripsi konser...</p>
                    </div>
					<div class="mt-3">
					    <div th:if="${konser.linkTiket != null and konser.linkTiket != ''}">
					        <a th:href="${konser.linkTiket}" target="_blank" class="btn btn-success w-100">
					            <i class="bi bi-ticket-fill me-1"></i> Pesan Tiket
					        </a>
					    </div>
					    <div th:unless="${konser.linkTiket != null and konser.linkTiket != ''}">
					        <button class="btn btn-secondary w-100" disabled>
					            <i class="bi bi-ticket-fill me-1"></i> Tiket belum tersedia
					        </button>
					    </div>
					</div>
					
                    <hr class="divider-dashed">

                    <div class="mt-4 d-flex flex-wrap gap-3">
                        <form th:action="@{/wishlist/add}" method="POST" class="m-0">
                            <input type="hidden" name="konserId" th:value="${konser.id}" />
                            <button type="submit" class="btn btn-wishlist btn-custom shadow"><i class="bi bi-heart-fill me-2"></i>Tambah ke Wishlist</button>
                        </form>
                        <a href="/daftar-konser" class="btn btn-back btn-custom"><i class="bi bi-arrow-left me-2"></i>Kembali</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
