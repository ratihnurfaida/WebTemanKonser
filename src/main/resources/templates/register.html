<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daftar - TemanKonser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --stage-black: #0B0E1A;
            --spot-violet: #8B5CF6;
            --spot-pink: #FB7185;
            --spot-amber: #FBBF24;
            --paper: #FAF9F6;
            --ink: #1B1B29;
            --muted-light: #6B7280;
            --font-display: 'Anton', sans-serif;
            --font-body: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--stage-black);
            background-image:
                radial-gradient(ellipse 700px 450px at 8% -5%, rgba(139,92,246,0.22), transparent 60%),
                radial-gradient(ellipse 600px 400px at 95% 5%, rgba(251,113,133,0.16), transparent 60%),
                radial-gradient(ellipse 500px 600px at 50% 100%, rgba(251,191,36,0.06), transparent 70%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: var(--font-body);
            min-height: 100vh;
        }

        .brand-mark {
            display: block;
            text-align: center;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            font-size: 1.7rem;
            color: #fff;
            margin-bottom: 22px;
        }
        .brand-mark .brand-accent { color: var(--spot-amber); }

        .login-card {
            border-radius: 24px;
            background: var(--paper);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
        }

        .login-title { color: var(--ink); }
        .login-sub {
            color: var(--muted-light);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-label {
            color: var(--muted-light);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 12px;
            border: 1px solid rgba(27,27,41,0.12);
            padding: 0.65rem 1rem;
            transition: 0.2s;
        }
        .form-control:focus {
            border-color: var(--spot-violet);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--spot-violet) 0%, var(--spot-pink) 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            border-radius: 50px;
            padding: 0.75rem;
            transition: 0.2s;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(139,92,246,0.35);
            color: #fff;
        }

        .register-link {
            color: var(--spot-violet);
            font-weight: 600;
            text-decoration: none;
        }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">
            <span class="brand-mark">Konser<span class="brand-accent">Id</span></span>

            <div class="card shadow-lg p-4 login-card border-0">
                <div class="card-body">
                    <h3 class="login-title card-title text-center mb-1 fw-bold">Daftar</h3>
                    <p class="login-sub">Daftar sekarang untuk menjelajahi konser favoritmu.</p>

                    <form th:action="@{/daftar}" method="POST">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-person-fill me-1"></i>Username</label>
                            <input type="text" name="username" class="form-control" required placeholder="Masukkan username">
                        </div>

                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-lock-fill me-1"></i>Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Masukkan password">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-login btn-lg">
                                <i class="bi bi-person-plus-fill me-2"></i>Daftar
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">Sudah punya akun? 
                            <a th:href="@{/login}" class="register-link">Masuk Sekarang</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
